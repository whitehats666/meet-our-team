<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spider · white small buttons</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a0c12;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* center group: title + button row */
        .center-group {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;               /* space between title and buttons */
            pointer-events: none;
        }

        .center-title {
            color: white;
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            text-shadow: 0 0 20px #ff99cc, 0 0 40px #b30059;
            pointer-events: none;
        }

        .button-row {
            display: flex;
            gap: 2rem;                /* reduced gap for smaller buttons */
            justify-content: center;
            pointer-events: auto;
        }

        /* smaller & white buttons (fulfills request) */
        .employee-btn {
            background: #ffffff;          /* solid white background */
            border: 2px solid rgba(200, 180, 190, 0.8);
            color: #2d121f;               /* dark text for contrast */
            font-size: clamp(1rem, 3.5vw, 1.5rem);  /* smaller font */
            font-weight: 700;
            padding: 0.3rem 1.2rem;        /* reduced padding → smaller */
            border-radius: 40px;            /* slightly rounded, but smaller */
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 4px 10px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s ease;
            pointer-events: auto;
            min-width: 140px;               /* narrower */
            text-align: center;
            backdrop-filter: none;           /* remove blur, solid white */
            border-color: #c0a0b0;           /* soft pinkish border */
        }

        .employee-btn:hover {
            background: #f0e0e8;           /* soft off-white on hover */
            border-color: #b3889c;
            box-shadow: 0 0 22px #ffffff, 0 0 40px #ffb6c1;
            transform: scale(1.03);          /* subtle scale */
            color: #1a0c12;
        }

        .employee-btn:active {
            transform: scale(0.97);
        }

        /* responsive: stack vertically on small screens */
        @media (max-width: 600px) {
            .center-title {
                font-size: clamp(2rem, 12vw, 3.5rem);
                white-space: normal;
                line-height: 1.2;
            }
            .button-row {
                flex-direction: column;
                gap: 1.2rem;
                width: 100%;
            }
            .employee-btn {
                font-size: 1.4rem;
                min-width: 190px;
                padding: 0.4rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="center-group">
        <div class="center-title">MEET OUR TEAM</div>
        <div class="button-row">
            <button class="employee-btn" id="emp1">EMPLOYEES</button>
            <button class="employee-btn" id="emp2">EMPLOYEES</button>
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            "use strict";

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            const { sin, cos, PI, hypot, min, max } = Math;
            const rnd = (x = 1, dx = 0) => Math.random() * x + dx;
            const lerp = (a, b, t) => a + (b - a) * t;
            const many = (n, fn) => Array.from({ length: n }, (_, i) => fn(i));
            const pt = (x, y) => ({ x, y });

            function noise(x, y, t = 101) {
                let w0 = sin(0.3 * x + 1.4 * t + 2.0 + 2.5 * sin(0.4 * y + -1.3 * t + 1.0));
                let w1 = sin(0.2 * y + 1.5 * t + 2.8 + 2.3 * sin(0.5 * x + -1.2 * t + 0.5));
                return w0 + w1;
            }

            function drawCircle(x, y, r) {
                ctx.beginPath();
                ctx.ellipse(x, y, r, r, 0, 0, PI * 2);
                ctx.fill();
            }

            function drawLine(x0, y0, x1, y1) {
                ctx.beginPath();
                ctx.moveTo(x0, y0);
                many(100, (i) => {
                    let t = (i + 1) / 100;
                    let x = lerp(x0, x1, t);
                    let y = lerp(y0, y1, t);
                    let k = noise(x / 5 + x0, y / 5 + y0) * 2;
                    ctx.lineTo(x + k, y + k);
                });
                ctx.stroke();
            }

            // spider spawn factory (identical to original)
            function spawn() {
                const pts = many(333, () => ({
                    x: rnd(innerWidth),
                    y: rnd(innerHeight),
                    len: 0,
                    r: 0
                }));

                const pts2 = many(9, (i) => ({
                    x: cos((i / 9) * PI * 2),
                    y: sin((i / 9) * PI * 2)
                }));

                let seed = rnd(100);
                let tx = rnd(innerWidth);
                let ty = rnd(innerHeight);
                let x = rnd(innerWidth);
                let y = rnd(innerHeight);
                let kx = rnd(0.5, 0.5);
                let ky = rnd(0.5, 0.5);
                let walkRadius = pt(rnd(50, 50), rnd(50, 50));
                let r = innerWidth / rnd(100, 150);

                function paintPt(pt) {
                    pts2.forEach((pt2) => {
                        if (!pt.len) return;
                        drawLine(
                            lerp(x + pt2.x * r, pt.x, pt.len * pt.len),
                            lerp(y + pt2.y * r, pt.y, pt.len * pt.len),
                            x + pt2.x * r,
                            y + pt2.y * r
                        );
                    });
                    drawCircle(pt.x, pt.y, pt.r);
                }

                return {
                    follow(mx, my) {
                        tx = mx;
                        ty = my;
                    },
                    tick(t) {
                        const selfMoveX = cos(t * kx + seed) * walkRadius.x;
                        const selfMoveY = sin(t * ky + seed) * walkRadius.y;
                        let fx = tx + selfMoveX;
                        let fy = ty + selfMoveY;

                        x += min(innerWidth / 100, (fx - x) / 10);
                        y += min(innerWidth / 100, (fy - y) / 10);

                        let i = 0;
                        pts.forEach((pt) => {
                            const dx = pt.x - x,
                                  dy = pt.y - y;
                            const len = hypot(dx, dy);
                            let r = min(2, innerWidth / len / 5);
                            pt.t = 0;
                            const increasing = len < innerWidth / 10 && (i++) < 8;
                            let dir = increasing ? 0.1 : -0.1;
                            if (increasing) r *= 1.5;
                            pt.r = r;
                            pt.len = max(0, min(pt.len + dir, 1));
                            paintPt(pt);
                        });
                    }
                };
            }

            const spiders = many(2, spawn);

            window.addEventListener('pointermove', (e) => {
                spiders.forEach(sp => sp.follow(e.clientX, e.clientY));
            });

            window.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length) {
                    spiders.forEach(sp => sp.follow(e.touches[0].clientX, e.touches[0].clientY));
                }
            }, { passive: false });

            let w, h;
            requestAnimationFrame(function anim(t) {
                if (w !== innerWidth) {
                    w = canvas.width = innerWidth;
                }
                if (h !== innerHeight) {
                    h = canvas.height = innerHeight;
                }

                // dark pink background
                ctx.fillStyle = "#2d121f";
                ctx.fillRect(0, 0, w, h);

                ctx.fillStyle = "#fff";
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 1.5;

                spiders.forEach(sp => sp.tick(t / 1000));

                requestAnimationFrame(anim);
            });

            // initial target center
            window.addEventListener('load', () => {
                spiders.forEach(sp => sp.follow(innerWidth / 2, innerHeight / 2));
            });

            // ----- BUTTON HANDLERS (white & smaller) -----
            const btn1 = document.getElementById('emp1');
            const btn2 = document.getElementById('emp2');

            function handleEmployeeClick(event) {
                const btnText = event.target.innerText;
                const btnId = event.target.id;
                alert(`✨ ${btnText} (${btnId}) — meet the team! ✨`);
            }

            btn1.addEventListener('click', handleEmployeeClick);
            btn2.addEventListener('click', handleEmployeeClick);

        })();
    </script>
</body>
</html>
